<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    .container {
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #43b581;
    }
    .url-preview {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .note-input {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 13px;
      resize: none;
      height: 60px;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
    }
    .note-input:focus {
      border-color: #5865f2;
    }
    .note-input::placeholder {
      color: #666;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary {
      background: #5865f2;
      color: #fff;
    }
    .btn-primary:hover {
      background: #4752c4;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-success {
      background: #43b581;
      color: #fff;
    }
    .btn-error {
      background: #ed4245;
      color: #fff;
    }
    .status {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }
    .settings-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      text-decoration: none;
      cursor: pointer;
    }
    .settings-link:hover {
      color: #999;
    }
    /* Settings panel */
    .settings {
      display: none;
    }
    .settings.active {
      display: block;
    }
    .settings label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
      margin-bottom: 10px;
      font-family: monospace;
    }
    .settings input:focus {
      border-color: #5865f2;
    }
    .btn-save {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #333;
    }
    .btn-save:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Main view -->
    <div id="main-view">
      <div class="header">
        <div class="dot"></div>
        <h1>Momo Bookmark</h1>
      </div>
      <div class="url-preview" id="url-preview">Loading...</div>
      <textarea class="note-input" id="note" placeholder="备注（可选）"></textarea>
      <button class="btn btn-primary" id="send-btn">收藏到 #bookmark</button>
      <div class="status" id="status"></div>
      <a class="settings-link" id="settings-toggle">⚙️ 设置 Webhook</a>
    </div>

    <!-- Settings view -->
    <div class="settings" id="settings-view">
      <div class="header">
        <h1>⚙️ 设置</h1>
      </div>
      <label>Webhook URL</label>
      <input type="text" id="webhook-url" placeholder="https://discord.com/api/webhooks/...">
      <label>显示名称</label>
      <input type="text" id="username" placeholder="kenefe" value="kenefe">
      <button class="btn btn-save" id="save-btn">保存</button>
      <a class="settings-link" id="back-toggle">← 返回</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
